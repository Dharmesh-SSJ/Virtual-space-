name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Gradle
      env:
        SKIP_JDK_VERSION_CHECK: "true"
      run: |
        # 1. Change the app name to Dssj
        find . -type f -name "strings.xml" -exec sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Dssj<\/string>/g' {} +
        
        # 2. Force the package name directly into all Manifest files (Notice the backslash before the $)
        find . -type f -name "AndroidManifest.xml" -exec sed -i 's/\${masterPkg}/com.virtual.dssj/g' {} +
        
        # 3. Add to properties just in case the Java code still looks for it
        echo "masterPkg=com.virtual.dssj" >> gradle.properties
        
        # 4. Compile the APK
        if [ -f ./gradlew ]; then
          chmod +x ./gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_11_X64
        else
          gradle assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_11_X64
        fi

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: VirtualSpace-APK
        path: "**/build/outputs/apk/debug/*.apk"
