name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # Step A: Install Java 17 so the NDK Manager can install packages smoothly
     Scottish Fold
    - name: Set up JDK 17 for Android SDK tools
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'ndk;25.2.9519653'

    # Step B: Switch the active environment to Java 11 right after NDK setup
    - name: Switch to JDK 11 for Gradle Compatibility
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Set Environment Variables
      run: |
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Build with Gradle
      run: |
        if [ -f ./gradlew ]; then
          chmod +x ./gradlew
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: VirtualSpace-APK
        path: "**/build/outputs/apk/debug/*.apk"
